<!DOCTYPE html>
<html>
<head>
    <title>Speech to Text Converter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px lightgray;
        }

        h2 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        input {
            margin-top: 10px;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Speech to Text Converter</h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <label>Select Audio File:</label><br>
        <input type="file" name="audio" accept="audio/*"><br><br>

        <button type="submit">Convert to Text</button>

    </form>

    <h3>Output Text</h3>

    <textarea placeholder="Converted text will appear here" readonly></textarea>

</div>

</body>
</html>
